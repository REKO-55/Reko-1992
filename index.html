<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REKO ROULETTE OMEGA</title>
    <style>
        :root { --red: #d32f2f; --black: #212121; --green: #388e3c; --gold: #FFD700; --bg: #2d1b2e; --panel: #4a2c4d; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        .roulette-board { max-width: 500px; margin: auto; background: linear-gradient(180deg, #4a2c4d, #2d1b2e); border: 3px solid #ffb300; border-radius: 20px; padding: 15px; box-shadow: 0 0 30px rgba(255, 179, 0, 0.3); }
        
        h2 { color: var(--gold); margin-top: 0; font-size: 24px; text-shadow: 2px 2px 4px #000; border-bottom: 2px dashed #ffb300; padding-bottom: 10px; }

        /* شريط السجلات */
        .history-bar { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ffb300; }
        .history-title { font-size: 12px; color: var(--gold); text-align: right; margin-bottom: 5px; }
        .nums-container { display: flex; justify-content: flex-end; gap: 5px; overflow-x: auto; direction: ltr; }
        .num-ball { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; border: 2px solid #fff; box-shadow: 0 2px 5px #000; color: #fff; }
        
        .bg-red { background: var(--red); }
        .bg-black { background: var(--black); }
        .bg-green { background: var(--green); }

        /* لوحة الإدخال */
        .input-section { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        .num-input { width: 80px; font-size: 24px; text-align: center; padding: 10px; border-radius: 10px; border: 2px solid var(--gold); background: #111; color: #fff; font-weight: bold; outline: none; }
        .add-btn { background: var(--green); color: #fff; border: none; padding: 15px 20px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }

        /* لوحة الرهان المطابقة للعبة */
        .bet-table { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .bet-box { background: rgba(255,255,255,0.1); border: 2px solid #888; border-radius: 10px; padding: 15px 5px; font-size: 18px; font-weight: bold; position: relative; transition: 0.3s; color: #fff; text-shadow: 1px 1px 2px #000; }
        .bet-box span { display: block; font-size: 12px; color: var(--gold); font-weight: normal; margin-top: 5px; }
        
        .box-0 { grid-column: span 3; background: var(--green); border-color: #00ff00; }
        .box-red { background: var(--red); border-color: #ff5252; }
        .box-black { background: var(--black); border-color: #555; }
        
        /* مؤشر التوقع (الفيشة الوهمية) */
        .target-chip { display: none; position: absolute; top: -10px; right: -10px; background: radial-gradient(circle, #FFD700, #f57f17); width: 25px; height: 25px; border-radius: 50%; border: 2px dashed #000; box-shadow: 0 0 10px #FFD700; z-index: 10; animation: blink 1s infinite alternate; }
        @keyframes blink { from { transform: scale(1); box-shadow: 0 0 10px #FFD700; } to { transform: scale(1.2); box-shadow: 0 0 20px #FFD700; } }

        .active-target { border-color: var(--gold); box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.5); }
        .active-target .target-chip { display: block; }

        .run-btn { background: linear-gradient(90deg, #FFD700, #ff8c00); color: #000; width: 100%; padding: 20px; border-radius: 15px; font-size: 20px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
        
        #ai-log { font-size: 12px; color: #ccc; margin-top: 15px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; text-align: right; line-height: 1.6; display: none; border-right: 3px solid var(--gold);}
    </style>
</head>
<body>

    <div class="roulette-board">
        <h2>🎡 REKO ROULETTE OMEGA 🎡</h2>

        <div class="history-bar">
            <div class="history-title">آخر الأرقام (الرادار الحي):</div>
            <div class="nums-container" id="history-strip">
                </div>
        </div>

        <div class="input-section">
            <input type="number" id="num-input" class="num-input" min="0" max="36" placeholder="0-36">
            <button class="add-btn" onclick="addNumber()">إدخال الرقم ➕</button>
        </div>

        <div style="font-size: 14px; color: var(--gold); margin-bottom: 10px; font-weight: bold; text-align: right;">لوحة التوقعات (أماكن وضع الفيشات):</div>
        
        <div class="bet-table" style="display: block; margin-bottom: 8px;">
            <div class="bet-box box-0" id="bet-0">0 <div class="target-chip"></div><span>x36</span></div>
        </div>

        <div class="bet-table">
            <div class="bet-box" id="bet-d1">1-12 <div class="target-chip"></div><span>x3</span></div>
            <div class="bet-box" id="bet-d2">13-24 <div class="target-chip"></div><span>x3</span></div>
            <div class="bet-box" id="bet-d3">25-36 <div class="target-chip"></div><span>x3</span></div>
        </div>

        <div class="bet-table" style="grid-template-columns: repeat(2, 1fr);">
            <div class="bet-box box-red" id="bet-red">أحمر <div class="target-chip"></div><span>x2</span></div>
            <div class="bet-box box-black" id="bet-black">أسود <div class="target-chip"></div><span>x2</span></div>
        </div>

        <div class="bet-table" style="grid-template-columns: repeat(2, 1fr);">
            <div class="bet-box" id="bet-even">زوجي <div class="target-chip"></div><span>x2</span></div>
            <div class="bet-box" id="bet-odd">فردي <div class="target-chip"></div><span>x2</span></div>
        </div>

        <button class="run-btn" onclick="analyzeRoulette()">🎯 تحليل ووضع الفيشات</button>
        <div id="ai-log"></div>
        <button onclick="resetBoard()" style="background:none; border:none; color:#aaa; margin-top:20px; text-decoration:underline; cursor:pointer;">تصفير الطاولة 🗑️</button>
    </div>

<script>
    // الأرقام الحمراء في الروليت الأوروبي
    const redNums = [1, 3, 5, 7, 9, 12, 14, 16, 18, 19, 21, 23, 25, 27, 30, 32, 34, 36];
    let history = []; // يخزن الأرقام

    function getProps(n) {
        if(n === 0) return { color: 'green', dozen: 0, eo: 'none' };
        return {
            color: redNums.includes(n) ? 'red' : 'black',
            dozen: n <= 12 ? 1 : (n <= 24 ? 2 : 3),
            eo: n % 2 === 0 ? 'even' : 'odd'
        };
    }

    function addNumber() {
        let val = parseInt(document.getElementById('num-input').value);
        if(isNaN(val) || val < 0 || val > 36) { alert("أدخل رقماً صحيحاً بين 0 و 36!"); return; }
        
        history.push(val);
        if(history.length > 15) history.shift(); // نحتفظ بآخر 15 للتحليل العميق
        
        document.getElementById('num-input').value = '';
        document.getElementById('num-input').focus();
        updateStrip();
        clearTargets();
        document.getElementById('ai-log').style.display = 'none';
    }

    function updateStrip() {
        const strip = document.getElementById('history-strip');
        strip.innerHTML = '';
        // نعرض آخر 10 فقط من اليمين لليسار
        let displayHist = history.slice(-10);
        displayHist.forEach(n => {
            let props = getProps(n);
            let colorClass = props.color === 'red' ? 'bg-red' : (props.color === 'black' ? 'bg-black' : 'bg-green');
            strip.innerHTML += `<div class="num-ball ${colorClass}">${n}</div>`;
        });
    }

    function clearTargets() {
        let boxes = document.querySelectorAll('.bet-box');
        boxes.forEach(b => b.classList.remove('active-target'));
    }

    // 🧠 العقل المدبر للروليت
    function analyzeRoulette() {
        if(history.length < 5) { alert("أدخل 5 أرقام على الأقل لكي يقرأ البرنامج نبض العجلة!"); return; }
        clearTargets();
        
        let logText = "<b>🧠 تحليل OMEGA:</b><br>";
        let targets = [];

        // 1. تحليل الدزينات (Dozen Sniper) - المراهنة على الغائب
        let dCounts = { 1: 0, 2: 0, 3: 0 };
        let recentD = history.map(n => getProps(n).dozen).filter(d => d !== 0);
        recentD.forEach(d => dCounts[d]++);
        
        // البحث عن الدزينة "النائمة" (أقل دزينة ظهرت في آخر 15 رقم)
        let minCount = 999; let targetDozen = 1;
        for(let d=1; d<=3; d++) {
            if(dCounts[d] < minCount) { minCount = dCounts[d]; targetDozen = d; }
        }
        targets.push(`bet-d${targetDozen}`);
        logText += `- الدزينة <b>(${targetDozen === 1 ? '1-12' : (targetDozen === 2 ? '13-24' : '25-36')})</b> هي الأقل ظهوراً. السيرفر سيقوم بالتعويض قريباً (رهان الموازنة x3).<br>`;

        // 2. تحليل الألوان (Color Mean Reversion)
        let redCount = history.filter(n => getProps(n).color === 'red').length;
        let blackCount = history.filter(n => getProps(n).color === 'black').length;
        
        // التحقق من فخ التكرار (Pulse Break)
        let lastColor = getProps(history[history.length-1]).color;
        let colorStreak = 1;
        for(let i=history.length-2; i>=0; i--) {
            if(getProps(history[i]).color === lastColor && lastColor !== 'green') colorStreak++;
            else break;
        }

        if (colorStreak >= 4) {
            // كسر النبض (ارك الموجة)
            targets.push(`bet-${lastColor}`);
            logText += `- 🚨 تم رصد <b>تكرار للون (${lastColor === 'red' ? 'الأحمر' : 'الأسود'})</b> ${colorStreak} مرات. السيرفر في وضع الفخ. راهن مع اللون ولا تعانده!<br>`;
        } else {
            // الموازنة الطبيعية
            let targetColor = redCount > blackCount ? 'black' : 'red';
            targets.push(`bet-${targetColor}`);
            logText += `- اللون <b>(${targetColor === 'red' ? 'الأحمر' : 'الأسود'})</b> هو المرجح إحصائياً للظهور بناءً على الكثافة السابقة.<br>`;
        }

        // 3. تحليل الزوجي والفردي
        let evenCount = history.filter(n => getProps(n).eo === 'even').length;
        let oddCount = history.filter(n => getProps(n).eo === 'odd').length;
        let targetEO = evenCount > oddCount ? 'odd' : 'even';
        targets.push(`bet-${targetEO}`);

        // 4. قناص الصفر (Zero Sniper)
        if(!history.includes(0) && history.length >= 10) {
            let zeroChance = Math.random(); // محاكاة لوزن الصفر
            if (zeroChance > 0.6) {
                targets.push('bet-0');
                logText += `- ⚠️ الصفر غائب منذ فترة. ضع رهان تأمين صغير على <b>(0)</b> لتجنب مسح الطاولة.<br>`;
            }
        }

        // إضاءة المربعات المستهدفة
        targets.forEach(id => {
            let el = document.getElementById(id);
            if(el) el.classList.add('active-target');
        });

        document.getElementById('ai-log').innerHTML = logText;
        document.getElementById('ai-log').style.display = 'block';
    }

    function resetBoard() {
        history = []; updateStrip(); clearTargets();
        document.getElementById('ai-log').style.display = 'none';
    }
</script>
</body>
</html>
